<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسیر — پلنر کنکور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --ink:#12151c;
    --ink-2:#0d0f14;
    --panel:#1a2029;
    --panel-2:#212836;
    --line: rgba(236,230,216,.09);
    --line-strong: rgba(236,230,216,.16);
    --paper:#ece6d8;
    --paper-dim: rgba(236,230,216,.62);
    --muted:#8b93a3;
    --brass:#d4a24c;
    --brass-dim: rgba(212,162,76,.16);
    --teal:#4fa695;
    --teal-dim: rgba(79,166,149,.16);
    --brick:#c1553f;
    --brick-dim: rgba(193,85,63,.16);
    --radius: 16px;
    --radius-sm: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(212,162,76,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(79,166,149,.06), transparent 60%),
      var(--ink);
    color:var(--paper);
    font-family:'Vazirmatn', sans-serif;
    min-height:100vh;
  }
  .num{ font-family:'Space Mono', monospace; direction:ltr; unicode-bidi:isolate; }
  ::selection{ background:var(--brass-dim); color:var(--paper); }
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--panel-2); border-radius:8px;}

  .app-shell{ display:flex; min-height:100vh; max-width:1440px; margin:0 auto; }

  /* Sidebar */
  .sidebar{
    width:230px; flex:none; padding:22px 16px;
    border-inline-start:1px solid var(--line);
    display:flex; flex-direction:column; gap:22px;
  }
  .brand{ display:flex; align-items:center; gap:10px; padding:0 4px; }
  .brand-mark{
    width:34px; height:34px; border-radius:9px;
    background:conic-gradient(from 220deg, var(--brass), var(--teal) 50%, var(--brass));
    display:flex; align-items:center; justify-content:center;
    font-weight:900; color:var(--ink); font-size:16px;
  }
  .brand-text b{ display:block; font-weight:800; font-size:16px; letter-spacing:.3px;}
  .brand-text span{ display:block; font-size:11px; color:var(--muted); margin-top:1px;}

  nav.tabs{ display:flex; flex-direction:column; gap:4px; }
  .tab-btn{
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; border-radius:var(--radius-sm);
    color:var(--paper-dim); background:transparent; border:1px solid transparent;
    cursor:pointer; font-family:inherit; font-size:13.5px; text-align:right;
    transition:.15s ease;
  }
  .tab-btn svg{ width:17px; height:17px; flex:none; opacity:.85;}
  .tab-btn:hover{ background:var(--panel); color:var(--paper); }
  .tab-btn.active{ background:var(--brass-dim); color:var(--brass); border-color:rgba(212,162,76,.25); font-weight:600;}
  .tab-btn.active svg{ opacity:1; }

  .sidebar-foot{ margin-top:auto; font-size:11px; color:var(--muted); line-height:1.9; padding:0 4px;}

  /* Main */
  .main{ flex:1; min-width:0; padding:22px 26px 60px; }
  .topbar{
    display:flex; align-items:stretch; gap:14px; margin-bottom:22px; flex-wrap:wrap;
  }
  .clock-card, .quote-card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px;
  }
  .clock-card{ flex:none; min-width:210px; }
  .clock-card .time{ font-size:26px; font-weight:700; }
  .clock-card .date{ margin-top:4px; font-size:13px; color:var(--muted); }
  .quote-card{ flex:1; min-width:260px; position:relative; display:flex; align-items:center; }
  .quote-card::before{
    content:"“"; position:absolute; top:2px; right:14px; font-size:44px; color:var(--brass-dim); font-family:Georgia, serif;
  }
  .quote-text{ font-size:14.5px; line-height:1.9; color:var(--paper); padding-inline-end:36px; }
  .quote-tag{ display:block; margin-top:8px; font-size:11.5px; color:var(--teal); }

  .view{ display:none; animation:fadeUp .35s ease; }
  .view.active{ display:block; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  h2.section-title{ font-size:15px; font-weight:700; margin:0 0 14px; display:flex; align-items:center; gap:8px; }
  h2.section-title .eyebrow{ font-size:10.5px; font-weight:600; color:var(--muted); background:var(--panel-2); border:1px solid var(--line); padding:3px 8px; border-radius:100px; }

  .grid{ display:grid; gap:14px; }
  .grid.cols-2{ grid-template-columns:1fr 1fr; }
  .grid.cols-3{ grid-template-columns:repeat(3,1fr); }
  .grid.cols-4{ grid-template-columns:repeat(4,1fr); }
  @media (max-width:980px){ .grid.cols-2, .grid.cols-3, .grid.cols-4{ grid-template-columns:1fr 1fr; } }
  @media (max-width:640px){ .grid.cols-2, .grid.cols-3, .grid.cols-4{ grid-template-columns:1fr; } }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px;
  }
  .card.tight{ padding:14px; }

  .stat{ display:flex; flex-direction:column; gap:6px; }
  .stat .label{ font-size:12px; color:var(--muted); }
  .stat .value{ font-size:24px; font-weight:700; }
  .stat .value small{ font-size:13px; color:var(--muted); font-weight:400; }

  label{ display:block; font-size:12.5px; color:var(--muted); margin-bottom:6px; }
  input[type=text], input[type=number], input[type=date], input[type=time], textarea, select{
    width:100%; background:var(--ink-2); border:1px solid var(--line-strong); color:var(--paper);
    padding:9px 11px; border-radius:9px; font-family:inherit; font-size:13.5px; outline:none;
    transition:.15s;
  }
  input:focus, textarea:focus, select:focus{ border-color:var(--brass); box-shadow:0 0 0 3px var(--brass-dim); }
  textarea{ resize:vertical; min-height:70px; }
  .field{ margin-bottom:12px; }
  .field-row{ display:flex; gap:10px; }
  .field-row > *{ flex:1; }

  button{ font-family:inherit; cursor:pointer; border:none; }
  .btn{
    background:var(--panel-2); color:var(--paper); border:1px solid var(--line-strong);
    padding:9px 16px; border-radius:9px; font-size:13px; font-weight:600; transition:.15s;
  }
  .btn:hover{ border-color:var(--brass); color:var(--brass); }
  .btn.primary{ background:var(--brass); color:var(--ink-2); border-color:var(--brass); }
  .btn.primary:hover{ filter:brightness(1.08); color:var(--ink-2); }
  .btn.ghost{ background:transparent; border:1px dashed var(--line-strong); color:var(--muted); }
  .btn.danger{ color:var(--brick); border-color:rgba(193,85,63,.35); }
  .btn.sm{ padding:6px 11px; font-size:12px; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th, td{ padding:9px 8px; text-align:right; border-bottom:1px solid var(--line); }
  th{ color:var(--muted); font-weight:600; font-size:12px; }
  tr:last-child td{ border-bottom:none; }
  .table-wrap{ overflow-x:auto; }

  .badge{ display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:3px 9px; border-radius:100px; font-weight:600; }
  .badge.weak{ background:var(--brick-dim); color:var(--brick); }
  .badge.mid{ background:var(--brass-dim); color:var(--brass); }
  .badge.strong{ background:var(--teal-dim); color:var(--teal); }
  .badge.plain{ background:var(--panel-2); color:var(--muted); }

  .subject-row{ display:grid; grid-template-columns: 1.4fr 1fr 1fr auto; gap:8px; align-items:center; margin-bottom:8px;}
  .subject-row .sname{ font-size:13px; color:var(--paper); }
  @media (max-width:640px){ .subject-row{ grid-template-columns:1fr 1fr; } }

  .day-list-item{ padding:12px 0; border-bottom:1px solid var(--line); }
  .day-list-item:last-child{ border-bottom:none; }
  .day-list-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
  .day-list-head .d{ font-weight:700; font-size:13.5px; }
  .day-list-meta{ display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .chip{ font-size:11px; color:var(--muted); background:var(--ink-2); border:1px solid var(--line); padding:3px 8px; border-radius:100px; }

  .ring-wrap{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; justify-content:center; }
  .ring-legend{ display:flex; flex-direction:column; gap:9px; }
  .ring-legend .li{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--paper-dim); }
  .ring-legend .dot{ width:9px; height:9px; border-radius:50%; flex:none; }

  .empty{ text-align:center; padding:26px 10px; color:var(--muted); font-size:13px; }

  .chart-box{ position:relative; height:260px; }
  .chart-box.tall{ height:320px; }
  .chart-box svg{ width:100%; height:100%; display:block; overflow:visible; }
  .svg-legend{ display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; justify-content:center; }
  .svg-legend .li2{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--paper-dim); }
  .svg-legend .dot2{ width:9px; height:9px; border-radius:50%; display:inline-block; }

  .strength-col{ display:flex; flex-direction:column; gap:8px; }
  .strength-item{ display:flex; justify-content:space-between; align-items:center; background:var(--ink-2); border:1px solid var(--line); border-radius:10px; padding:9px 12px; }
  .strength-item .sn{ font-size:13px; font-weight:600; }
  .strength-item .sp{ font-size:12.5px; color:var(--muted); }

  .week-nav{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .week-nav .wl{ font-size:13.5px; font-weight:600; }

  .footer-note{ font-size:11.5px; color:var(--muted); margin-top:10px; }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--panel-2); border:1px solid var(--brass); color:var(--paper);
    padding:10px 18px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none;
    transition:.25s; z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* mobile nav */
  .mobile-topnav{ display:none; }
  @media (max-width:860px){
    .app-shell{ flex-direction:column; }
    .sidebar{ width:100%; flex-direction:row; align-items:center; border-inline-start:none; border-bottom:1px solid var(--line); padding:12px 16px; }
    .sidebar nav.tabs{ display:none; }
    .sidebar-foot{ display:none; }
    .mobile-topnav{ display:flex; gap:6px; overflow-x:auto; padding:0 16px 12px; -webkit-overflow-scrolling:touch; }
    .mobile-topnav .tab-btn{ flex:none; white-space:nowrap; }
    .main{ padding:16px; }
  }

  /* small phones */
  @media (max-width:480px){
    .brand-text span{ display:none; }
    .main{ padding:12px; }
    .topbar{ gap:10px; margin-bottom:16px; }
    .clock-card{ min-width:0; flex:1 1 140px; padding:12px 14px; }
    .quote-card{ min-width:0; flex:1 1 100%; padding:12px 14px; }
    .clock-card .time{ font-size:21px; }
    .quote-text{ font-size:13.5px; padding-inline-end:28px; }
    h2.section-title{ font-size:14px; }
    .card{ padding:14px; }
    .card.tight{ padding:11px; }
    .field-row{ flex-direction:column; }
    .subject-row{ grid-template-columns:1fr 1fr; }
    .subject-row .sname{ grid-column:1 / -1; }
    table{ font-size:12px; }
    th, td{ padding:7px 6px; }
    .stat .value{ font-size:20px; }
    .week-nav{ gap:6px; }
    .week-nav .wl{ font-size:12.5px; }
  }

  /* prevent iOS auto-zoom on input focus */
  @media (max-width:860px){
    input[type=text], input[type=number], input[type=date], input[type=time], textarea, select{ font-size:16px; }
  }

  /* ================= AUTH ================= */
  #authOverlay{
    position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(212,162,76,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(79,166,149,.07), transparent 60%),
      var(--ink);
    padding:20px;
  }
  #authOverlay.hidden{ display:none; }
  .auth-card{
    width:100%; max-width:380px; background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line); border-radius:var(--radius); padding:28px 26px;
  }
  .auth-brand{ display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .auth-title{ font-size:16px; font-weight:800; margin:0 0 4px; }
  .auth-sub{ font-size:12.5px; color:var(--muted); margin:0 0 20px; line-height:1.8; }
  .auth-step{ display:none; }
  .auth-step.active{ display:block; }
  .btn.google{
    width:100%; background:#fff; color:#1a1a1a; border-color:#fff; display:flex; align-items:center; justify-content:center; gap:10px;
    padding:11px 16px;
  }
  .btn.google:hover{ filter:brightness(.96); color:#1a1a1a; border-color:#fff; }
  .auth-divider{ display:flex; align-items:center; gap:10px; margin:16px 0; color:var(--muted); font-size:11.5px; }
  .auth-divider::before, .auth-divider::after{ content:""; flex:1; height:1px; background:var(--line-strong); }
  .btn.block{ width:100%; }
  .auth-error{ font-size:12px; color:var(--brick); margin-top:8px; min-height:16px; }
  .auth-back{ display:inline-block; margin-top:14px; font-size:12px; color:var(--muted); cursor:pointer; }
  .auth-back:hover{ color:var(--brass); }
  #recaptcha-container{ margin-top:4px; }
  .user-chip{ display:flex; align-items:center; gap:8px; padding:8px 4px; }
  .user-chip img{ width:26px; height:26px; border-radius:50%; flex:none; }
  .user-chip .un{ font-size:12px; color:var(--paper); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .user-chip .uphone{ font-size:11px; color:var(--muted); direction:ltr; text-align:right; }
</style>
</head>
<body>

<div id="authOverlay">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark">م</div>
      <div class="brand-text"><b>مسیر</b><span>پلنر مطالعه و کنکور</span></div>
    </div>

    <!-- Google sign-in -->
    <div class="auth-step active" id="authStepChoice">
      <p class="auth-title">ورود یا ثبت‌نام</p>
      <p class="auth-sub">برای اینکه برنامه، آزمون‌ها و گزارش‌هایت همیشه در دسترست باشد، وارد اکانتت شو.</p>
      <button class="btn google" id="btnGoogle">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5h-1.9V20.4H24v7.2h11.3c-1.6 4.7-6.1 8.1-11.3 8.1-6.9 0-12.5-5.6-12.5-12.5S17.1 10.7 24 10.7c3.2 0 6.1 1.2 8.3 3.2l5.1-5.1C34.5 5.9 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 5.9 4.3C13.8 15.5 18.6 12.7 24 12.7c3.2 0 6.1 1.2 8.3 3.2l5.1-5.1C34.5 7.9 29.5 6 24 6c-7.5 0-14 4.2-17.3 10.4z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-1.8 14-4.9l-6.5-5.4c-2 1.4-4.6 2.3-7.5 2.3-5.2 0-9.6-3.4-11.2-8.1l-6.1 4.7C9.9 39.7 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H24v7.2h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.5 5.4c-.5.4 6.5-4.8 6.5-14.2 0-1.2-.1-2.4-.4-3.5z"/></svg>
        ورود با اکانت گوگل
      </button>
      <div class="auth-error" id="authErrorChoice"></div>
    </div>
  </div>
</div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">م</div>
      <div class="brand-text"><b>مسیر</b><span>پلنر مطالعه و کنکور</span></div>
    </div>
    <nav class="tabs" id="navTabs"></nav>
    <div id="userChip" class="user-chip"></div>
    <div class="sidebar-foot">
      داده‌های تو به اکانتت متصل است و از هر دستگاهی در دسترست خواهد بود.<br>
      <span class="auth-back" id="btnLogout" style="margin-top:6px;">خروج از حساب</span>
    </div>
  </aside>

  <main class="main">
    <div class="mobile-topnav" id="navTabsMobile"></div>

    <div class="topbar">
      <div class="clock-card">
        <div class="time num" id="clockTime">--:--:--</div>
        <div class="date" id="clockDate">در حال بارگذاری تاریخ...</div>
      </div>
      <div class="quote-card">
        <div>
          <div class="quote-text" id="quoteText">...</div>
          <span class="quote-tag">جمله انگیزشی امروز</span>
        </div>
      </div>
    </div>

    <section class="view" id="view-dashboard"></section>
    <section class="view" id="view-daily"></section>
    <section class="view" id="view-exams"></section>
    <section class="view" id="view-weekly"></section>
    <section class="view" id="view-analytics"></section>
    <section class="view" id="view-settings"></section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= ICONS ================= */
const ICONS = {
  dashboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="5" rx="2"/><rect x="13" y="12" width="8" height="9" rx="2"/><rect x="3" y="14" width="8" height="7" rx="2"/></svg>',
  daily:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5V6a2 2 0 0 1 2-2h9l5 5v10.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 4v5h5"/><path d="M8 13h8M8 17h5"/></svg>',
  exams:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="12" cy="12" r="0.6" fill="currentColor"/></svg>',
  weekly:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9.5h18M8 3v3M16 3v3"/><path d="M7 14h3M7 17h6"/></svg>',
  analytics:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M11 20V4M18 20v-7"/><path d="M2.5 20.5h19"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3.1"/><path d="M19.4 13.5a7.6 7.6 0 0 0 0-3l2-1.4-2-3.5-2.3.7a7.7 7.7 0 0 0-2.6-1.5L14 2h-4l-.5 2.3a7.7 7.7 0 0 0-2.6 1.5l-2.3-.7-2 3.5 2 1.4a7.6 7.6 0 0 0 0 3l-2 1.4 2 3.5 2.3-.7c.75.65 1.63 1.16 2.6 1.5L10 22h4l.5-2.3c.97-.34 1.85-.85 2.6-1.5l2.3.7 2-3.5-2-1.4Z"/></svg>'
};

const TABS = [
  {id:'dashboard', label:'داشبورد'},
  {id:'daily', label:'برنامه روزانه'},
  {id:'exams', label:'آزمون‌ها'},
  {id:'weekly', label:'گزارش هفتگی'},
  {id:'analytics', label:'تحلیل عملکرد'},
  {id:'settings', label:'تنظیمات'}
];

/* ================= QUOTES ================= */
const QUOTES = [
  {t:'مغز تو مثل عضله عمل می‌کند؛ هر بار که با یک مسئله سخت کلنجار می‌روی، قوی‌تر می‌شود، نه ضعیف‌تر.', a:'روان‌شناسی یادگیری'},

/* ================= HELPERS ================= */
function toPersianDigits(str){ return String(str).replace(/[0-9]/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]); }
function pad(n){ return n<10 ? '0'+n : ''+n; }
function todayKey(d){ d = d || new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtHM(mins){ mins = Math.max(0, Math.round(mins||0)); const h = Math.floor(mins/60), m = mins%60; return h+':'+pad(m); }
function uid(){ return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

const PERSIAN_MONTHS = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
const PERSIAN_WEEKDAYS = ['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه','شنبه'];

function gregorianToJalali(gy, gm, gd){
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let gy2 = (gm > 2) ? (gy + 1) : gy;
  let days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) + gd + g_d_m[gm - 1];
  let jy = -1595 + (33 * Math.floor(days / 12053));
  days %= 12053;
  jy += 4 * Math.floor(days / 1461);
  days %= 1461;
  if (days > 365) { jy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
  let jm, jd;
  if (days < 186) { jm = 1 + Math.floor(days / 31); jd = 1 + (days % 31); }
  else { jm = 7 + Math.floor((days - 186) / 30); jd = 1 + ((days - 186) % 30); }
  return [jy, jm, jd];
}

function dayOfYear(d){ const start = new Date(d.getFullYear(),0,0); const diff = d - start; return Math.floor(diff / (1000*60*60*24)); }

function classify(pct){
  if(pct < 30) return {label:'ضعیف', cls:'weak'};
  if(pct < 60) return {label:'متوسط', cls:'mid'};
  return {label:'عالی', cls:'strong'};
}

function calcExamPercentage(correct, wrong, total, choices){
  choices = choices || 4;
  const negFactor = 1/(choices-1);
  const raw = correct - (wrong*negFactor);
  if(!total || total<=0) return 0;
  return (raw/total)*100;
}

function sleepDurationMinutes(start, end){
  if(!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let s = sh*60+sm, e = eh*60+em;
  let dur = e - s;
  if(dur <= 0) dur += 24*60;
  return dur;
}

function emptyDay(){ return { plan:'', sleepStart:'', sleepEnd:'', phoneMinutes:0, phoneReason:'', otherWaste:0, subjects:{} }; }
function getDay(key){ return STATE.days[key] || emptyDay(); }

function studyTotalOfDay(day){
  let sum=0; for(const s in day.subjects){ sum += (day.subjects[s].minutes||0); } return sum;
}
function testsTotalOfDay(day){
  let sum=0; for(const s in day.subjects){ sum += (day.subjects[s].tests||0); } return sum;
}

function getWeekStartDate(dateObj){
  const d = new Date(dateObj);
  const day = d.getDay(); // 0=Sun...6=Sat
  const diff = (day - 6 + 7) % 7; // days since Saturday
  d.setDate(d.getDate()-diff);
  d.setHours(0,0,0,0);
  return d;
}
function keyFromDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function weekDates(weekStart){ const arr=[]; for(let i=0;i<7;i++){ const d=new Date(weekStart); d.setDate(d.getDate()+i); arr.push(d); } return arr; }

function subjectAvgPercentage(subject){
  const list = STATE.exams.filter(e=>e.subject===subject);
  if(!list.length) return null;
  const sum = list.reduce((a,e)=>a+e.percentage,0);
  return sum/list.length;
}
function subjectTotalStudyMinutes(subject, days){
  let sum=0;
  const src = days || STATE.days;
  for(const k in src){ const d = src[k]; if(d.subjects && d.subjects[subject]) sum += (d.subjects[subject].minutes||0); }
  return sum;
}
function subjectTotalTests(subject, days){
  let sum=0;
  const src = days || STATE.days;
  for(const k in src){ const d = src[k]; if(d.subjects && d.subjects[subject]) sum += (d.subjects[subject].tests||0); }
  return sum;
}

function rowStrength(x, cls){
  const meta = classify(x.avg);
  return `<div class="strength-item"><span class="sn">${x.s}</span><span><span class="badge ${cls}">${meta.label}</span> <span class="sp num">${toPersianDigits(x.avg.toFixed(1))}٪</span></span></div>`;
}
function buildRingSegments(segs, size, cx, r, strokeW){
  const total = segs.reduce((a,s)=>a+s.val,0) || 1;
  const circ = 2*Math.PI*r;
  let offsetAcc = 0;
  return segs.map(s=>{
    const frac = s.val/total;
    const len = frac*circ;
    const dasharray = `${len} ${circ-len}`;
    const dashoffset = circ*0.25 - offsetAcc; // start at top, clockwise-ish
    offsetAcc += len;
    return `<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${strokeW}" stroke-dasharray="${dasharray}" stroke-dashoffset="${dashoffset}" stroke-linecap="butt"></circle>`;
  }).join('');
}

/* ===== Lightweight dependency-free SVG chart engine ===== */
function svgWrap(w,h,inner){
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" dir="ltr">${inner}</svg>`;
}
function levelColor(pct){
  const c = classify(pct).cls;
  return c==='weak' ? '#c1553f' : c==='mid' ? '#d4a24c' : '#4fa695';
}
function renderLegend(hostEl, items){

  const lg = document.createElement('div');
  lg.className = 'svg-legend';
  lg.innerHTML = items.map(c=>`<span class="li2"><span class="dot2" style="background:${c.color}"></span>${c.label}</span>`).join('');
  hostEl.parentElement.appendChild(lg);
}

function drawExamTrendChart(){
  const filter = document.getElementById('examFilterSubject').value;
  let list = [...STATE.exams].sort((a,b)=> a.date<b.date?-1:1);
  if(filter!=='all') list = list.filter(e=>e.subject===filter);
  const host = document.getElementById('examTrendChart');
  host.parentElement.querySelectorAll('.svg-legend').forEach(n=>n.remove());
  if(!list.length){ host.innerHTML = '<div class="empty">هنوز آزمونی برای رسم نمودار ثبت نشده.</div>'; return; }

  const W=640,H=240, padL=40, padR=14, padT=14, padB=32;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const vals = list.map(e=>e.percentage);
  const yMin = Math.min(-20, Math.floor(Math.min(...vals)/20)*20);
  const yMax = 100;
  const yScale = v => padT + plotH - ((v-yMin)/(yMax-yMin))*plotH;
  const xScale = i => list.length===1 ? padL+plotW/2 : padL + (i/(list.length-1))*plotW;

  let grid='';
  for(let g=yMin; g<=yMax; g+=20){
    const y=yScale(g);
    grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="rgba(236,230,216,.08)" stroke-width="1"/>`;
    grid += `<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#8b93a3" font-family="'Space Mono',monospace">${g}</text>`;
  }
  if(yMin<0){
    const y0=yScale(0);
    grid += `<line x1="${padL}" y1="${y0.toFixed(1)}" x2="${W-padR}" y2="${y0.toFixed(1)}" stroke="rgba(193,85,63,.45)" stroke-width="1.2" stroke-dasharray="4 3"/>`;
  }

  const pathD = list.map((e,i)=>(i===0?'M':'L')+xScale(i).toFixed(1)+','+yScale(e.percentage).toFixed(1)).join(' ');
  const areaD = pathD + ` L${xScale(list.length-1).toFixed(1)},${(padT+plotH).toFixed(1)} L${xScale(0).toFixed(1)},${(padT+plotH).toFixed(1)} Z`;

  let points='', labels='';
  const labelEvery = Math.max(1, Math.ceil(list.length/12));
  list.forEach((e,i)=>{
    const x=xScale(i), y=yScale(e.percentage), color=levelColor(e.percentage);
    points += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${color}" stroke="#12151c" stroke-width="1.5"><title>${e.date} — ${e.subject}: ${e.percentage.toFixed(1)}%</title></circle>`;
    if(i%labelEvery===0 || i===list.length-1){
      labels += `<text x="${x.toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9.5" fill="#8b93a3" font-family="'Space Mono',monospace">${toPersianDigits(e.date.slice(5))}</text>`;
    }
  });

  host.innerHTML = svgWrap(W,H, `${grid}<path d="${areaD}" fill="rgba(212,162,76,.12)" stroke="none"/><path d="${pathD}" fill="none" stroke="#d4a24c" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>${points}${labels}`);
}

/* ================= WEEKLY ================= */
let WEEKLY_OFFSET = 0;
function renderWeekly(){
  const el = document.getElementById('view-weekly');

  keys.forEach(k=>{ const d=days[k]; studySum+=studyTotalOfDay(d); testsSum+=testsTotalOfDay(d); phoneSum+=(d.phoneMinutes||0); wasteSum += (d.otherWaste||0); sleepSum+=sleepDurationMinutes(d.sleepStart,d.sleepEnd); });

  const [jy1,jm1,jd1] = gregorianToJalali(dates[0].getFullYear(),dates[0].getMonth()+1,dates[0].getDate());
  const [jy2,jm2,jd2] = gregorianToJalali(dates[6].getFullYear(),dates[6].getMonth()+1,dates[6].getDate());
  const label = `${toPersianDigits(jd1)} ${PERSIAN_MONTHS[jm1-1]} تا ${toPersianDigits(jd2)} ${PERSIAN_MONTHS[jm2-1]} ${toPersianDigits(jy2)}`;

      <button class="btn sm" id="weekNext" ${WEEKLY_OFFSET>=0?'disabled style="opacity:.4"':''}>› هفته بعد</button>
    </div>

    <div class="grid cols-4" style="margin-bottom:14px;">
      <div class="card stat"><span class="label">جمع مطالعه هفته</span><span class="value num">${toPersianDigits(fmtHM(studySum))}</span></div>
      <div class="card stat"><span class="label">جمع تست هفته</span><span class="value num">${toPersianDigits(testsSum)}</span></div>
      <div class="card stat"><span class="label">جمع گوشی هفته</span><span class="value num" style="color:${phoneSum>630?'var(--brick)':'var(--paper)'}">${toPersianDigits(fmtHM(phoneSum))}</span></div>
      <div class="card stat"><span class="label">جمع خواب هفته</span><span class="value num">${toPersianDigits(fmtHM(sleepSum))}</span></div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <h2 class="section-title">مقایسه روزانه زمان‌ها در این هفته</h2>
      <div class="chart-box tall" id="weeklyCompareChart"></div>

    <div class="card">
      <h2 class="section-title">جدول درس‌ها در این هفته</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>درس</th><th>زمان مطالعه</th><th>تعداد تست</th></tr></thead>

            ${STATE.subjects.map(s=>{
              const mins = subjectTotalStudyMinutes(s, days);

            }).join('')}

  drawWeeklyCompareChart(dates, keys, days);

function drawWeeklyCompareChart(dates, keys, days){
  const host = document.getElementById('weeklyCompareChart');
  const cats = [
    {label:'مطالعه', color:'#4fa695', get:d=>studyTotalOfDay(d)/60},
    {label:'گوشی', color:'#c1553f', get:d=>(d.phoneMinutes||0)/60},
    {label:'بطالت دیگر', color:'#9b6b3f', get:d=>(d.otherWaste||0)/60},
    {label:'خواب', color:'#d4a24c', get:d=>sleepDurationMinutes(d.sleepStart,d.sleepEnd)/60}
  ];
  const W=640,H=300, padL=36, padR=14, padT=14, padB=34;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const totals = keys.map(k=>cats.reduce((s,c)=>s+c.get(days[k]),0));
  const yMax = Math.max(6, Math.ceil(Math.max(...totals,1)));
  const yStep = Math.max(1, Math.round(yMax/5));
  const yScale = v => padT+plotH-(v/yMax)*plotH;
  const step = plotW/keys.length;
  const bw = step*0.56;

  let grid='';
  for(let g=0; g<=yMax; g+=yStep){
    const y=yScale(g);
    grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="rgba(236,230,216,.08)"/>`;
    grid += `<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#8b93a3" font-family="'Space Mono',monospace">${toPersianDigits(g)}</text>`;
  }

  let bars='', labels='';
  keys.forEach((k,i)=>{
    const d = days[k];
    const x = padL + step*i + (step-bw)/2;
    let yCursor = padT+plotH;
    cats.forEach(c=>{
      const v = c.get(d);
      const h = (v/yMax)*plotH;
      if(h>0.4){
        yCursor -= h;
        bars += `<rect x="${x.toFixed(1)}" y="${yCursor.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${c.color}"><title>${c.label}: ${v.toFixed(1)} ساعت</title></rect>`;
      }
    });
    labels += `<text x="${(x+bw/2).toFixed(1)}" y="${H-12}" text-anchor="middle" font-size="10.5" fill="#8b93a3">${PERSIAN_WEEKDAYS[dates[i].getDay()]}</text>`;
  });

  host.innerHTML = svgWrap(W,H, grid+bars+labels);
  renderLegend(host, cats);
}

/* ================= ANALYTICS ================= */

  const el = document.getElementById('view-analytics');
  const perf = STATE.subjects.map(s=>({s, avg: subjectAvgPercentage(s), minutes: subjectTotalStudyMinutes(s)}));
  const withData = perf.filter(x=>x.avg!==null);
  const weak = withData.filter(x=>x.avg<30), mid = withData.filter(x=>x.avg>=30 && x.avg<60), strong = withData.filter(x=>x.avg>=60);

  const overuseDays = Object.keys(STATE.days).filter(k=> (STATE.days[k].phoneMinutes||0) > 90).sort().reverse();

  el.innerHTML = `
    <h2 class="section-title">تحلیل عملکرد</h2>
    <div class="grid cols-2" style="margin-bottom:14px;">
      <div class="card">
        <h2 class="section-title">میانگین درصد هر درس</h2>
        <div class="chart-box" id="subjectPercentChart"></div>
      </div>
      <div class="card">
        <h2 class="section-title">زمان مطالعه در برابر عملکرد هر درس</h2>
        <div class="chart-box" id="studyVsPerfChart"></div>
        <div class="footer-note">هر نقطه یک درس است؛ محور افقی جمع دقیقه مطالعه و محور عمودی میانگین درصد آزمون‌های همان درس.</div>
      </div>
    </div>

    <div class="grid cols-3" style="margin-bottom:14px;">
      <div class="card">
        <h2 class="section-title"><span class="badge strong">عالی</span></h2>
        <div class="strength-col">${strong.length? strong.map(x=>rowStrength2(x)).join('') : '<div class="empty">هنوز موردی نیست</div>'}</div>
      </div>
      <div class="card">
        <h2 class="section-title"><span class="badge mid">متوسط</span></h2>
        <div class="strength-col">${mid.length? mid.map(x=>rowStrength2(x)).join('') : '<div class="empty">هنوز موردی نیست</div>'}</div>
      </div>
      <div class="card">
        <h2 class="section-title"><span class="badge weak">ضعیف</span></h2>
        <div class="strength-col">${weak.length? weak.map(x=>rowStrength2(x)).join('') : '<div class="empty">هنوز موردی نیست</div>'}</div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">روزهای پرمصرف گوشی <span class="eyebrow">بیشتر از ۹۰ دقیقه</span></h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>تاریخ</th><th>دقیقه گوشی</th><th>وضعیت</th><th>توضیح ثبت‌شده</th></tr></thead>
          <tbody>
            ${overuseDays.length? overuseDays.map(k=>{
              const d = STATE.days[k];
              return `<tr><td class="num">${toPersianDigits(k)}</td><td class="num" style="color:var(--brick)">${toPersianDigits(d.phoneMinutes)}</td>
                <td><span class="badge ${d.phoneReason?'mid':'weak'}">${d.phoneReason?'توجیه‌شده':'بدون توضیح'}</span></td>
                <td>${d.phoneReason? escapeHtml(d.phoneReason) : '—'}</td></tr>`;
            }).join('') : `<tr><td colspan="4" class="empty">تا اینجا روز پرمصرفی ثبت نشده — عالیه!</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;

  drawSubjectPercentChart(withData);
  drawStudyVsPerfChart(withData);
}
function drawSubjectPercentChart(withData){
  const host = document.getElementById('subjectPercentChart');
  if(!withData.length){ host.innerHTML = '<div class="empty">به محض ثبت اولین آزمون، این نمودار ساخته می‌شود.</div>'; return; }
  const W=640,H=260, padL=38, padR=14, padT=14, padB=56;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const yMin=-20, yMax=100;
  const yScale = v => padT+plotH-((v-yMin)/(yMax-yMin))*plotH;
  const step = plotW/withData.length;
  const bw = Math.min(52, step*0.5);
  const zeroY = yScale(0);

  let grid='';
  for(let g=yMin; g<=yMax; g+=20){
    const y=yScale(g);
    grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="rgba(236,230,216,.08)"/>`;
    grid += `<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#8b93a3" font-family="'Space Mono',monospace">${g}</text>`;
  }
  grid += `<line x1="${padL}" y1="${zeroY.toFixed(1)}" x2="${W-padR}" y2="${zeroY.toFixed(1)}" stroke="rgba(236,230,216,.2)"/>`;

  let bars='', labels='';
  withData.forEach((x,i)=>{
    const cx = padL+step*i+step/2;
    const color = levelColor(x.avg);
    const y = yScale(x.avg);
    const top = Math.min(y, zeroY), h = Math.max(Math.abs(zeroY-y), 1.5);
    bars += `<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${color}"><title>${x.s}: ${x.avg.toFixed(1)}%</title></rect>`;
    labels += `<text x="${cx.toFixed(1)}" y="${H-32}" text-anchor="middle" font-size="10" fill="#8b93a3" transform="rotate(-28 ${cx.toFixed(1)} ${H-32})">${x.s}</text>`;
  });
  host.innerHTML = svgWrap(W,H, grid+bars+labels);
}
function drawStudyVsPerfChart(withData){
  const host = document.getElementById('studyVsPerfChart');
  if(!withData.length){ host.innerHTML = '<div class="empty">به محض ثبت اولین آزمون، این نمودار ساخته می‌شود.</div>'; return; }
  const W=640,H=260, padL=42, padR=20, padT=18, padB=32;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xMax = Math.max(1, Math.ceil(Math.max(...withData.map(x=>x.minutes/60))));
  const yMin=-20, yMax=100;
  const xScale = v => padL+(v/xMax)*plotW;
  const yScale = v => padT+plotH-((v-yMin)/(yMax-yMin))*plotH;

  let grid='';
  for(let g=yMin; g<=yMax; g+=20){
    const y=yScale(g);
    grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="rgba(236,230,216,.08)"/>`;
    grid += `<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#8b93a3" font-family="'Space Mono',monospace">${g}</text>`;
  }
  const xStep = Math.max(1, Math.round(xMax/5));
  for(let g=0; g<=xMax; g+=xStep){
    const x=xScale(g);
    grid += `<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${padT+plotH}" stroke="rgba(236,230,216,.05)"/>`;
    grid += `<text x="${x.toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="9.5" fill="#8b93a3" font-family="'Space Mono',monospace">${toPersianDigits(g)}h</text>`;
  }

  let pts='';
  withData.forEach(x=>{
    const color = levelColor(x.avg);
    const cx = xScale(x.minutes/60), cy = yScale(x.avg);
    pts += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="6" fill="${color}" fill-opacity=".88" stroke="#12151c" stroke-width="1.5"><title>${x.s}: ${x.avg.toFixed(1)}% / ${(x.minutes/60).toFixed(1)} ساعت</title></circle>`;
    pts += `<text x="${cx.toFixed(1)}" y="${(cy-11).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="#8b93a3">${x.s}</text>`;
  });
  host.innerHTML = svgWrap(W,H, grid+pts);
}
function rowStrength2(x){
  return `<div class="strength-item"><span class="sn">${x.s}</span><span class="sp num">${toPersianDigits(x.avg.toFixed(1))}٪ · ${toPersianDigits(fmtHM(x.minutes))} مطالعه</span></div>`;
}

/* ================= SETTINGS ================= */
function renderSettings(){
  const el = document.getElementById('view-settings');
  el.innerHTML = `
    <h2 class="section-title">تنظیمات دروس</h2>
    <div class="card" style="max-width:520px;">
      <div id="subjectList"></div>
      <div class="field-row" style="margin-top:10px;">
        <input type="text" id="newSubjectName" placeholder="نام درس جدید">
        <button class="btn primary" id="addSubjectBtn">افزودن</button>
      </div>
      <div class="footer-note">حذف یک درس، داده‌های ثبت‌شده گذشته آن را از گزارش‌ها مخفی می‌کند اما آزمون‌های قبلی حذف نمی‌شوند.</div>
    </div>
  `;
  const list = document.getElementById('subjectList');
  list.innerHTML = STATE.subjects.map((s,i)=>`
    <div class="subject-row" style="grid-template-columns:1fr auto;">
      <span class="sname">${s}</span>
      <button class="btn sm danger" onclick="removeSubject(${i})">حذف</button>
    </div>`).join('');
  document.getElementById('addSubjectBtn').onclick = ()=>{
    const v = document.getElementById('newSubjectName').value.trim();
    if(!v) return;
    if(STATE.subjects.includes(v)){ showToast('این درس قبلاً وجود دارد'); return; }
    STATE.subjects.push(v); saveSettings(); showToast('درس اضافه شد'); renderSettings();
  };
}
function removeSubject(i){
  STATE.subjects.splice(i,1); saveSettings(); showToast('درس حذف شد'); renderSettings();
}

/* ================= INIT ================= */
let APP_STARTED = false;
async function startApp(){
  if(APP_STARTED) return;
  APP_STARTED = true;
  buildNav();
  tickClock(); setInterval(tickClock, 1000);
  setQuote();
  document.getElementById('view-'+ACTIVE_TAB).classList.add('active');
  await loadAll();
  renderActive();
}

auth.onAuthStateChanged(async (user)=>{
  if(user){
    CURRENT_USER = user;
    authOverlay.classList.add('hidden');
    renderUserChip(user);
    await startApp();
  } else {
    CURRENT_USER = null;
    APP_STARTED = false;
    authOverlay.classList.remove('hidden');
  }
});
